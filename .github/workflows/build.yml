# GitHub Actions 工作流 - Windows 打包
# 养老金融通报数据自动化处理系统

name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: pwsh
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      
      # 4. 清理旧的打包文件
      - name: Clean old builds
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
      
      # 5. PyInstaller 打包 (使用spec文件)
      - name: Build with PyInstaller
        run: |
          pyinstaller PensionFinSystem.spec --clean
      
      # 6. 查看生成的 EXE
      - name: List built files
        run: |
          Get-ChildItem -Path dist -Recurse | Select-Object Name, Length, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}}
      
      # 7. 上传 EXE 作为 Artifact
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PensionFinSystem-Windows-EXE
          path: dist/PensionFinSystem/PensionFinSystem.exe
          retention-days: 7
      
      # 8. 验证 EXE 文件
      - name: Verify EXE
        run: |
          $exePath = "dist/PensionFinSystem/PensionFinSystem.exe"
          if (Test-Path $exePath) {
            $size = (Get-Item $exePath).Length / 1MB
            Write-Host "✅ EXE file built successfully!"
            Write-Host "   Size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "❌ EXE file not found!"
            exit 1
          }
