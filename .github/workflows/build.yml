# GitHub Actions 工作流 - Windows 打包
# 养老金融通报数据自动化处理系统

name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: pwsh
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      
      # 4. 清理旧的打包文件
      - name: Clean old builds
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
      
      # 5. 测试运行
      - name: Test import
        run: |
          python -c "import gui.main_window; print('Import OK')"
      
      # 6. PyInstaller 打包
      - name: Build with PyInstaller
        run: |
          pyinstaller PensionFinSystem.spec --clean --log-level DEBUG 2>&1 | Tee-Object -FilePath build.log
      
      # 7. 查看输出目录
      - name: List output
        run: |
          Get-ChildItem -Path dist -Recurse | Format-Table Name, Length -AutoSize
      
      # 8. 查看EXE文件
      - name: Find EXE
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse
          if ($exe) {
            Write-Host "Found EXE: $($exe.FullName)"
            Write-Host "Size: $([math]::Round($exe.Length/1MB, 2)) MB"
          } else {
            Write-Host "No EXE found!"
            Get-ChildItem -Path dist -Recurse | Select-Object FullName
          }
      
      # 9. 上传整个dist目录
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PensionFinSystem-Windows-EXE
          path: dist/
          retention-days: 7
